<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ventas Telefónicas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header fijo -->
    <header class="app-header">
        <div class="header-info">
            <div class="branch-name" id="branchName">Cargando...</div>
            <div class="user-name" id="userName"></div>
        </div>
        <button class="btn-logout" onclick="logout()">Salir</button>
    </header>

    <!-- Barra de búsqueda -->
    <div class="search-bar">
        <input type="search" id="searchInput" placeholder="🔍 Buscar por nombre o DNI..."
               oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <!-- Filtros -->
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-tab" onclick="setFilter('pending', this)">Sin contactar</button>
        <button class="filter-tab" onclick="setFilter('contacted', this)">Contactados</button>
    </div>

    <!-- Lista de clientes -->
    <div class="client-list" id="clientList">
        <div class="loading">⏳ Cargando clientes...</div>
    </div>

    <!-- Toast notification -->
    <div class="toast hidden" id="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
